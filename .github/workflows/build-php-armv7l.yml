name: Build static PHP for armv7l

on:
  workflow_dispatch:
    inputs:
      php_version:
        description: 'PHP 版本 (如 8.0.30)'
        required: true
        default: '8.0.30'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Create output directory
        run: mkdir -p output

      - name: Download spc (static PHP compiler)
        run: |
          wget -q https://dl.static-php.dev/static-php-cli/spc-bin/nightly/spc-linux-x86_64 -O spc
          chmod +x spc

      - name: Clean previous build artifacts (if any)
        run: |
          rm -rf source downloads buildroot || true

      - name: Fetch PHP sources
        run: |
          ./spc fetch ${{ github.event.inputs.php_version }}

      - name: Build static PHP CLI for armv7l
        run: |
          ./spc build ${{ github.event.inputs.php_version }} \
            --target=linux-arm \
            --build-cli \
            --disable-all-extensions

      - name: Locate binary
        id: locate
        run: |
          binary_path=$(find builds -name "php*linux-arm*" -type f -executable | head -n1)
          if [ -z "$binary_path" ]; then
            echo "Binary not found!"
            exit 1
          fi
          echo "binary=$binary_path" >> $GITHUB_OUTPUT

      - name: Upload binary as artifact
        uses: actions/upload-artifact@v4
        with:
          name: php-${{ github.event.inputs.php_version }}-armv7l-static
          path: ${{ steps.locate.outputs.binary }}