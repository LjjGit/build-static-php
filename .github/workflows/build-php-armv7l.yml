name: Build static PHP for ARMv7l

on:
  workflow_dispatch:
    inputs:
      php_version:
        description: 'PHP version (e.g., 8.3.0)'
        required: true
        default: '8.3.0'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Create output directory
        run: mkdir -p output

      - name: Download spc
        run: |
          curl -Lo spc https://dl.static-php.dev/static-php-cli/spc-bin/nightly/spc-linux-x86_64
          chmod +x spc

      - name: Clean previous builds
        run: |
          rm -rf source downloads buildroot || true

      - name: Fetch PHP sources
        run: |
          ./spc fetch ${{ github.event.inputs.php_version }} --clean

      - name: Build static PHP CLI for armv7l
        run: |
          ./spc build ${{ github.event.inputs.php_version }} \
            --arch=armv7l \
            --build-cli \
            --with-extensions=curl,openssl,mbstring,sqlite3,zlib

      - name: Locate binary
        id: locate
        run: |
          binary_path=$(find builds -name "php*linux-arm*" -type f -executable | head -n1)
          if [ -z "$binary_path" ]; then
            echo "Binary not found!"
            exit 1
          fi
          echo "binary=$binary_path" >> $GITHUB_OUTPUT

      - name: Upload binary as artifact
        uses: actions/upload-artifact@v4
        with:
          name: php-${{ github.event.inputs.php_version }}-armv7l-static
          path: ${{ steps.locate.outputs.binary }}